name: CI

# Host-side Unity tests (pure logic, no hardware) + firmware compiles so a change
# that passes host tests but breaks a real build is caught before merge:
#   - X32Link  (ESP32-S3, arduino-cli): headless + Waveshare touch + QT Py NeoPixel variants
#   - KitchenSync    (ESP32-P4, ESP-IDF): the hub-tier target (see ADR-0005)
on:
  push:
    branches: [master]
  pull_request:

jobs:
  host-tests:
    name: Host logic tests (Unity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        run: make -C test          # Unity is vendored in lib/unity — no submodule step

  firmware-compile:
    name: Firmware compile (X32Link)
    runs-on: ubuntu-latest
    env:
      FQBN: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=16M,PSRAM=opi
    steps:
      - uses: actions/checkout@v4

      - name: Cache arduino-cli data
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: arduino-esp32-${{ runner.os }}-v1

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 core + LovyanGFX
        run: |
          # --overwrite: idempotent when a cached ~/.arduino15 already has a config
          arduino-cli config init --overwrite --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install LovyanGFX

      - name: Compile X32Link (headless)
        run: arduino-cli compile --fqbn "$FQBN" X32Link

      - name: Compile X32Link (Waveshare touch board)
        run: |
          echo '-DBOARD_WAVESHARE_S3_TOUCH_LCD_147' > X32Link/build_opt.h
          arduino-cli compile --fqbn "$FQBN" X32Link
          git checkout -- X32Link/build_opt.h

      # LED_RGB path (LNK-039) only compiles under this flag — without it the
      # NeoPixel colour glue is preprocessed away in both variants above.
      - name: Compile X32Link (QT Py NeoPixel board)
        run: |
          echo '-DBOARD_QTPY_ESP32S3' > X32Link/build_opt.h
          arduino-cli compile --fqbn "$FQBN" X32Link
          git checkout -- X32Link/build_opt.h

      # battery_gauge_io.cpp's Wire calls only compile under this flag — opt-in
      # per unit (not every QT Py has the LiPo BFF attached), so it needs its
      # own job or it never gets compiled at all.
      - name: Compile X32Link (QT Py + LiPo BFF battery gauge)
        run: |
          printf -- '-DBOARD_QTPY_ESP32S3\n-DHAS_BATTERY_GAUGE\n' > X32Link/build_opt.h
          arduino-cli compile --fqbn "$FQBN" X32Link
          git checkout -- X32Link/build_opt.h

  loralink-compile:
    name: Firmware compile (LoraLink)
    runs-on: ubuntu-latest
    env:
      # 8MB flash, no PSRAM (Meshnology N30 — different profile from X32Link's
      # QT Py/Super Mini). CDCOnBoot must stay 'default': this board has no
      # native USB, only a CP2102 UART bridge, so 'cdc' silently blackholes
      # Serial. Confirmed on-device: CDCOnBoot=cdc gave a silent serial
      # console; FlashSize=16M gave a boot-time spi_flash size-mismatch
      # assert crash-loop.
      FQBN: esp32:esp32:esp32s3:CDCOnBoot=default,FlashSize=8M,PSRAM=disabled
    steps:
      - uses: actions/checkout@v4

      - name: Cache arduino-cli data
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: arduino-esp32-lora-${{ runner.os }}-v1

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 core + LoRa/OLED libs
        run: |
          arduino-cli config init --overwrite --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install RadioLib U8g2

      - name: Provide placeholder WiFi secrets for CI compile
        run: cp LoraLink/lora_secrets.h.example LoraLink/lora_secrets.h

      - name: Compile LoraLink (sender role)
        run: arduino-cli compile --fqbn "$FQBN" LoraLink

      - name: Compile LoraLink (receiver role)
        run: |
          echo '-DLORA_ROLE_OVERRIDE=LORA_ROLE_RECEIVER' > LoraLink/build_opt.h
          arduino-cli compile --fqbn "$FQBN" LoraLink
          git checkout -- LoraLink/build_opt.h

  kitchensync-compile:
    name: Firmware compile (KitchenSync, ESP-IDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Builds KitchenSync for the ESP32-P4 via the official ESP-IDF Docker action.
      # idf.py auto-downloads any managed components (esp_hosted / esp_wifi_remote
      # once the P4-004/005 glue lands). release-v5.5 has the esp32p4 min-rev gate.
      - name: Compile KitchenSync for esp32p4
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32p4
          path: 'KitchenSync'
