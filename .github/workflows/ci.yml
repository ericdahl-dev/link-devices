name: CI

# Host-side Unity tests (pure logic, no hardware) + firmware compiles so a change
# that passes host tests but breaks a real build is caught before merge:
#   - X32Link  (ESP32-S3, arduino-cli): headless + Waveshare touch + QT Py NeoPixel variants
#   - X32_emulator (ESP32-S3 XIAO, arduino-cli): on-device X32 OSC test double
#   - KitchenSync    (ESP32-P4, ESP-IDF): the hub-tier target (see ADR-0005)
on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Docs-only PRs (tickets, docs/, any .md) don't need a firmware build.
  #
  # NOT done with `paths-ignore`: the four jobs below are REQUIRED checks, and a
  # workflow skipped by a path filter never reports them — they hang Pending and the
  # PR is blocked forever (GitHub documents this; it is the same failure mode as a
  # stale required-check name). So the jobs always RUN and report; every step inside
  # them is gated on this output instead. A docs-only PR goes green in seconds.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        run: |
          # Pushes to master always build — only PRs get the docs shortcut.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Anything that is not a ticket, a doc, or a .md counts as code.
          if git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" \
             | grep -qvE '(^tasks/|^docs/|\.md$)'; then
            echo "code=true"  >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  host-tests:
    name: Host logic tests (Unity)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'
      - name: Build and run host tests
        if: needs.changes.outputs.code == 'true'
        run: make -C test          # Unity is vendored in lib/unity — no submodule step
      - name: Run X32 emulator seam tests
        if: needs.changes.outputs.code == 'true'
        run: make -C tests run     # native gcc — x32_port IP/defaults/path seam

  # ---------------------------------------------------------------------------
  # Six sketch/board variants used to compile SEQUENTIALLY in one job -- 3m45, and
  # the critical path for the whole workflow (everything else finished in ~2 min).
  # They are independent, so they fan out. Wall time drops to one compile + setup.
  #
  # The caches are shared by key, so the matrix legs all restore the same warm
  # ~/.arduino15 + core.a instead of rebuilding the ESP32 core seven times.
  # ---------------------------------------------------------------------------
  firmware-compile:
    name: Compile ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false        # one broken board flag must not hide the others
      matrix:
        include:
          - name: X32Link (headless)
            sketch: X32Link
            fqbn: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=16M,PSRAM=opi
            flags: ""
          - name: X32Link (Waveshare touch)
            sketch: X32Link
            fqbn: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=16M,PSRAM=opi
            flags: "-DBOARD_WAVESHARE_S3_TOUCH_LCD_147"
          # LED_RGB path (LNK-039) only compiles under this flag.
          - name: X32Link (QT Py NeoPixel)
            sketch: X32Link
            fqbn: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=16M,PSRAM=opi
            flags: "-DBOARD_QTPY_ESP32S3"
          # battery_gauge_io.cpp's Wire calls only compile under this flag -- opt-in
          # per unit, so without its own leg it never gets compiled at all.
          - name: X32Link (QT Py + LiPo BFF)
            sketch: X32Link
            fqbn: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=16M,PSRAM=opi
            flags: "-DBOARD_QTPY_ESP32S3 -DHAS_BATTERY_GAUGE"
          - name: X32 emulator (ESP-002)
            sketch: X32_emulator
            fqbn: esp32:esp32:XIAO_ESP32S3:PSRAM=opi,FlashSize=8M,PartitionScheme=default_8MB,USBMode=hwcdc
            flags: ""
          # PartitionScheme=custom is what makes the core USE the sketch-local
          # partitions.csv (16MB dual-OTA). Without it the core silently falls back
          # to the 4MB default table -- which is how the sketch quietly hit 87% full.
          - name: KitchenSyncTouch (S3 touch board)
            sketch: KitchenSyncTouch
            fqbn: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=16M,PSRAM=opi,PartitionScheme=custom
            flags: ""
    env:
      CORE_CACHE: ${{ github.workspace }}/.arduino-core-cache
    steps:
      - uses: actions/checkout@v4

      - name: Cache arduino-cli data (ESP32 core + libraries)
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: arduino-esp32-${{ runner.os }}-x32link-v1
          restore-keys: |
            arduino-esp32-${{ runner.os }}-

      - name: Cache arduino-cli binary
        id: cache-arduino-cli-bin
        uses: actions/cache@v4
        with:
          path: bin
          key: arduino-cli-bin-${{ runner.os }}-v1

      - name: Cache arduino compiled core
        uses: actions/cache@v4
        with:
          path: ${{ env.CORE_CACHE }}
          key: arduino-core-${{ runner.os }}-x32link-v1
          restore-keys: |
            arduino-core-${{ runner.os }}-

      - name: Install arduino-cli
        if: steps.cache-arduino-cli-bin.outputs.cache-hit != 'true'
        run: curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s

      - name: Add arduino-cli to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 core + LovyanGFX
        run: |
          arduino-cli config init --overwrite --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install LovyanGFX

      - name: Compile
        run: |
          # build_opt.h is one -D per line. Space-separated in the matrix so there is no
          # YAML escape semantics to get subtly wrong.
          : > "${{ matrix.sketch }}/build_opt.h"
          for f in ${{ matrix.flags }}; do echo "$f" >> "${{ matrix.sketch }}/build_opt.h"; done
          echo "build_opt.h:"; cat "${{ matrix.sketch }}/build_opt.h"
          arduino-cli compile --fqbn "${{ matrix.fqbn }}" \
                              --build-cache-path "$CORE_CACHE" "${{ matrix.sketch }}"

  # The ESP-025 bench rig: KitchenSyncTouch on a CLASSIC ESP32 (no USB peripheral, no
  # display, 4MB flash). It was not compiled by CI at all -- the board profile could
  # break and only the bench would find out. build-bench.sh is the ONLY supported way
  # to build it: it swaps the board flag AND the partition table together, because the
  # product's 16MB S3 table on a 4MB chip boot-loops with no app and no serial banner.
  bench-rig-compile:
    name: Compile KitchenSyncTouch (ESP-025 bench rig, classic ESP32)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      CORE_CACHE: ${{ github.workspace }}/.arduino-core-cache
    steps:
      - uses: actions/checkout@v4
      - name: Cache arduino-cli data (ESP32 core + libraries)
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: arduino-esp32-${{ runner.os }}-x32link-v1
          restore-keys: |
            arduino-esp32-${{ runner.os }}-
      - name: Cache arduino-cli binary
        id: cache-arduino-cli-bin
        uses: actions/cache@v4
        with:
          path: bin
          key: arduino-cli-bin-${{ runner.os }}-v1
      - name: Cache arduino compiled core
        uses: actions/cache@v4
        with:
          path: ${{ env.CORE_CACHE }}
          key: arduino-core-${{ runner.os }}-x32link-v1
          restore-keys: |
            arduino-core-${{ runner.os }}-
      - name: Install arduino-cli
        if: steps.cache-arduino-cli-bin.outputs.cache-hit != 'true'
        run: curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s
      - name: Add arduino-cli to PATH
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"
      - name: Install ESP32 core
        run: |
          arduino-cli config init --overwrite --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
      - name: Compile via tools/build-bench.sh
        run: tools/build-bench.sh
      - name: HEAD must still be the product board
        run: |
          grep -q '^#define BOARD_WAVESHARE_S3_TOUCH_LCD_147' KitchenSyncTouch/config.h \
            || { echo "build-bench.sh left the board flag swapped"; exit 1; }
          head -1 KitchenSyncTouch/partitions.csv | grep -q '16 MB' \
            || { echo "build-bench.sh left the DevKit partition table in place"; exit 1; }

  loralink-compile:
    name: Firmware compile (LoraLink)
    runs-on: ubuntu-latest
    needs: changes
    env:
      # 8MB flash, no PSRAM (Meshnology N30 — different profile from X32Link's
      # QT Py/Super Mini). CDCOnBoot must stay 'default': this board has no
      # native USB, only a CP2102 UART bridge, so 'cdc' silently blackholes
      # Serial. Confirmed on-device: CDCOnBoot=cdc gave a silent serial
      # console; FlashSize=16M gave a boot-time spi_flash size-mismatch
      # assert crash-loop.
      FQBN: esp32:esp32:esp32s3:CDCOnBoot=default,FlashSize=8M,PSRAM=disabled
      # Persisted core.a build cache — keyed separately from firmware-compile
      # because this board's FQBN (8M/no-PSRAM) yields a different compiled core.
      CORE_CACHE: ${{ github.workspace }}/.arduino-core-cache
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'

      # See firmware-compile's matching step for why the key is static + versioned.
      # restore-keys falls back to firmware-compile's cache (same esp32:esp32 core)
      # on a cold cache instead of re-downloading the core from scratch.
      - name: Cache arduino-cli data (ESP32 core + libraries)
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: arduino-esp32-${{ runner.os }}-lora-v1
          restore-keys: |
            arduino-esp32-${{ runner.os }}-

      - name: Cache arduino-cli binary
        if: needs.changes.outputs.code == 'true'
        id: cache-arduino-cli-bin
        uses: actions/cache@v4
        with:
          path: bin
          key: arduino-cli-bin-${{ runner.os }}-v1

      - name: Cache arduino compiled core
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.CORE_CACHE }}
          key: arduino-core-${{ runner.os }}-lora-v1
          restore-keys: |
            arduino-core-${{ runner.os }}-

      - name: Install arduino-cli
        if: needs.changes.outputs.code == 'true' && steps.cache-arduino-cli-bin.outputs.cache-hit != 'true'
        run: curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s

      - name: Add arduino-cli to PATH
        if: needs.changes.outputs.code == 'true'
        run: echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 core + LoRa/OLED libs
        if: needs.changes.outputs.code == 'true'
        run: |
          arduino-cli config init --overwrite --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install RadioLib U8g2

      - name: Provide placeholder WiFi secrets for CI compile
        if: needs.changes.outputs.code == 'true'
        run: cp LoraLink/lora_secrets.h.example LoraLink/lora_secrets.h

      - name: Compile LoraLink (sender role)
        if: needs.changes.outputs.code == 'true'
        run: arduino-cli compile --fqbn "$FQBN" --build-cache-path "$CORE_CACHE" LoraLink

      - name: Compile LoraLink (receiver role)
        if: needs.changes.outputs.code == 'true'
        run: |
          echo '-DLORA_ROLE_OVERRIDE=LORA_ROLE_RECEIVER' > LoraLink/build_opt.h
          arduino-cli compile --fqbn "$FQBN" --build-cache-path "$CORE_CACHE" LoraLink
          git checkout -- LoraLink/build_opt.h

  kitchensync-compile:
    name: Firmware compile (KitchenSync, ESP-IDF)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code == 'true'

      # Component-manager downloads (esp_hosted / esp_wifi_remote etc.), keyed on
      # the lock file. Exact-match only: a dependencies.lock change forces a clean
      # re-resolve rather than restoring a stale component set.
      - name: Cache ESP-IDF managed components
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: KitchenSync/managed_components
          key: idf-managed-${{ runner.os }}-${{ hashFiles('KitchenSync/dependencies.lock') }}

      # ccache dir persists compiled objects across runs. Rolling key (newest run
      # wins); restore-keys pulls master's latest onto PRs. ccache is content-hashed
      # so a stale entry is simply a miss, never wrong output.
      - name: Cache ESP-IDF ccache
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: KitchenSync/.ccache
          key: idf-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            idf-ccache-${{ runner.os }}-

      # Pre-create so a cold miss still has a dir to mount + save (no Path
      # Validation warning), and so ccache has somewhere to write on run one.
      - name: Prepare ccache dir
        if: needs.changes.outputs.code == 'true'
        run: mkdir -p KitchenSync/.ccache

      # Builds KitchenSync for the ESP32-P4 via the official ESP-IDF Docker action.
      # idf.py auto-downloads any managed components (esp_hosted / esp_wifi_remote
      # once the P4-004/005 glue lands). release-v5.5 has the esp32p4 min-rev gate.
      #
      # The action is *composite* and only forwards IDF_TARGET into the container,
      # so ccache env must be injected via extra_docker_args (-e). It mounts the
      # workspace at /app/<owner>/<repo>, so CCACHE_DIR points there — that maps
      # back to KitchenSync/.ccache on the host (the dir cached above).
      # IDF_CCACHE_ENABLE makes idf.py launch the compiler through ccache;
      # CCACHE_BASEDIR + NOHASHDIR keep hits alive across the per-run build path.
      - name: Compile KitchenSync for esp32p4
        if: needs.changes.outputs.code == 'true'
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32p4
          path: 'KitchenSync'
          extra_docker_args: >-
            -e IDF_CCACHE_ENABLE=1
            -e CCACHE_DIR=/app/${{ github.repository }}/KitchenSync/.ccache
            -e CCACHE_BASEDIR=/app/${{ github.repository }}
            -e CCACHE_NOHASHDIR=1

      # ESP-026: the SAME project, on the other two chips. This is the whole premise of the
      # migration -- one ESP-IDF app, three board targets -- and without CI it rots in a week.
      #
      # The P4-only hardware (ES8311 speaker, USB-MIDI host) is gated out by target in
      # main/CMakeLists.txt, and its headers hand back no-op stubs, so the app core compiles
      # unchanged on all three. A build that fails here means somebody reached for P4 hardware
      # from shared code.
      # idf.py writes `sdkconfig` pinned to the target it built, and KitchenSync/sdkconfig is
      # TRACKED (the P4's). Reusing the same directory for the next target makes CMake read a
      # config for the wrong chip and die with exit 2. Wipe it between targets; each one
      # regenerates from sdkconfig.defaults.
      - name: Reset sdkconfig between targets
        if: needs.changes.outputs.code == 'true'
        run: rm -rf KitchenSync/build KitchenSync/sdkconfig

      - name: Compile KitchenSync for esp32s3 (ESP-026 multi-target)
        if: needs.changes.outputs.code == 'true'
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32s3
          path: 'KitchenSync'

      # idf.py writes `sdkconfig` pinned to the target it built, and KitchenSync/sdkconfig is
      # TRACKED (the P4's). Reusing the same directory for the next target makes CMake read a
      # config for the wrong chip and die with exit 2. Wipe it between targets; each one
      # regenerates from sdkconfig.defaults.
      - name: Reset sdkconfig between targets
        if: needs.changes.outputs.code == 'true'
        run: rm -rf KitchenSync/build KitchenSync/sdkconfig

      - name: Compile KitchenSync for esp32 (ESP-026, the bench-rig chip)
        if: needs.changes.outputs.code == 'true'
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.5
          target: esp32
          path: 'KitchenSync'

  # ---------------------------------------------------------------------------
  # GATE. This job compiles nothing.
  #
  # Branch protection on master requires the status context
  # "Firmware compile (X32Link + KitchenSyncTouch + X32 emulator)". That used to be a
  # real job. Fanning it out into a matrix renamed it, so the required context stopped
  # ever reporting -- and auto-merge sat BLOCKED forever with every check green. (It did.)
  #
  # So this keeps that exact name and gates on every compile leg instead. Now the matrix
  # can grow, shrink or get renamed without anyone editing repo settings, and a green
  # tick here genuinely means every board built.
  #
  # if: always() + explicit result checks -- `needs` alone would SKIP this job when a
  # dependency fails, and a skipped required check is not a failing one, which would let a
  # broken build merge.
  # ---------------------------------------------------------------------------
  firmware-compile-gate:
    name: Firmware compile (X32Link + KitchenSyncTouch + X32 emulator)
    runs-on: ubuntu-latest
    needs: [changes, firmware-compile, bench-rig-compile]
    if: always()
    steps:
      - name: All board compiles must have passed
        run: |
          echo "changes:          ${{ needs.changes.result }}"
          echo "firmware-compile: ${{ needs.firmware-compile.result }}"
          echo "bench-rig:        ${{ needs.bench-rig-compile.result }}"
          # A docs-only PR skips the compiles by design -- that is a pass, not a failure.
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "no code changed; compiles skipped by design"; exit 0
          fi
          [ "${{ needs.firmware-compile.result }}" = "success" ] || exit 1
          [ "${{ needs.bench-rig-compile.result }}"  = "success" ] || exit 1
          echo "every board compiled"
