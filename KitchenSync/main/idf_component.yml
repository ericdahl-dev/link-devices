dependencies:
  # WiFi on the P4 comes from the onboard ESP32-C6 over ESP-Hosted -- the P4 has no radio
  # of its own. The S3 and the classic ESP32 DO, so they use native esp_wifi and must NOT
  # pull this stack in at all.
  espressif/esp_hosted:
    version: "~2"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_wifi_remote:
    version: ">=0.10,<2.0"
    rules:
      - if: "target in [esp32p4]"
  # ES8311 codec: the P4-NANO's onboard speaker (P4-006). No other board has one.
  espressif/es8311:
    version: "^1.0.0"
    rules:
      - if: "target in [esp32p4]"
  espressif/led_strip: "^2.5.5"
  espressif/mdns: "^1.8.0"
  # ESP-026 spike: the 1.47" touch LCD lives only on the Waveshare S3 board. LovyanGFX
  # drives ESP-IDF's SPI natively, so the same Panel_ST7789 config as the Arduino Touch
  # sketch carries over. Pulled only for the S3 target; gated further by the
  # CONFIG_KS_TOUCH_DISPLAY Kconfig flag (a headless S3 leaves it off).
  lovyan03/LovyanGFX:
    version: "^1.1.16"
    rules:
      - if: "target in [esp32s3]"
